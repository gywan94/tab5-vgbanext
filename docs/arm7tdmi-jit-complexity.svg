<svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif">
<title id="t">ARM7TDMI / THUMB 指令模拟（JIT 翻译）复杂度思维导图</title>
<desc id="d">按 JIT 翻译复杂度把 ARM7TDMI/THUMB 指令分为四大类（数据处理、寄存器与内存、控制流、ARM 模式）和五个复杂度等级，从纯寄存器数据运算（最易）到 ARM 模式独立翻译器（最难）。</desc>
<style>
  .lane { fill: #f5f5f3; stroke: #e3e3df; }
  .card { fill: #ffffff; stroke: #d8d8d2; }
  .tab  { fill: #ffffff; stroke: #d8d8d2; }
  .hub  { fill: #1a1a18; }
  .ttl  { fill: #1a1a18; font-weight: 700; }
  .sub  { fill: #6b6b66; }
  .lbl  { fill: #fff; font-weight: 700; }
  .lk   { stroke: #cfcfca; fill: none; }
  .leg  { fill: #6b6b66; }
</style>
<rect x="0" y="0" width="1100" height="760" fill="#ffffff"/>
<path class="lk" d="M222 380 C 240 380 232 130 250 130"/>
<path class="lk" d="M222 380 C 240 380 232 300 250 300"/>
<path class="lk" d="M222 380 C 240 380 232 470 250 470"/>
<path class="lk" d="M222 380 C 240 380 232 640 250 640"/>
<rect class="hub" x="24" y="330" width="198" height="100" rx="14"/>
<text x="123" y="368" text-anchor="middle" fill="#fff" font-size="13" opacity="0.85">ARM7TDMI / THUMB</text>
<text x="123" y="392" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">指令模拟</text>
<text x="123" y="414" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">复杂度</text>

<rect class="lane" x="250" y="74" width="828" height="112" rx="12"/>
<rect class="tab" x="262" y="98" width="104" height="64" rx="9"/>
<text x="314" y="124" text-anchor="middle" class="ttl" font-size="13">数据处理</text>
<text x="314" y="143" text-anchor="middle" class="sub" font-size="11">纯计算</text>
<g><rect class="card" x="384" y="92" width="158" height="78" rx="9"/><rect x="384" y="92" width="5" height="78" rx="2.5" fill="#1f9d6b"/><circle cx="406" cy="114" r="11" fill="#1f9d6b"/><text x="406" y="118" text-anchor="middle" class="lbl" font-size="12">1</text><text x="424" y="118" class="ttl" font-size="12.5">MOV·移位·逻辑</text><text x="396" y="146" class="sub" font-size="11">纯寄存器 · 1:1 翻译</text></g>
<g><rect class="card" x="552" y="92" width="158" height="78" rx="9"/><rect x="552" y="92" width="5" height="78" rx="2.5" fill="#6aa84f"/><circle cx="574" cy="114" r="11" fill="#6aa84f"/><text x="574" y="118" text-anchor="middle" class="lbl" font-size="12">2</text><text x="592" y="118" class="ttl" font-size="12.5">ADD·SUB·CMP</text><text x="564" y="146" class="sub" font-size="11">全标志 NZCV · 3项溢出</text></g>
<g><rect class="card" x="720" y="92" width="158" height="78" rx="9"/><rect x="720" y="92" width="5" height="78" rx="2.5" fill="#e0a32e"/><circle cx="742" cy="114" r="11" fill="#e0a32e"/><text x="742" y="118" text-anchor="middle" class="lbl" font-size="12">3</text><text x="760" y="118" class="ttl" font-size="12.5">ADC·SBC·NEG</text><text x="732" y="146" class="sub" font-size="11">带进位 · 标志最难</text></g>
<g><rect class="card" x="888" y="92" width="178" height="78" rx="9"/><rect x="888" y="92" width="5" height="78" rx="2.5" fill="#6aa84f"/><circle cx="910" cy="114" r="11" fill="#6aa84f"/><text x="910" y="118" text-anchor="middle" class="lbl" font-size="12">2</text><text x="928" y="118" class="ttl" font-size="12.5">MUL · (U/S)MULL</text><text x="900" y="146" class="sub" font-size="11">需主机乘法 (RV32M)</text></g>

<rect class="lane" x="250" y="244" width="828" height="112" rx="12"/>
<rect class="tab" x="262" y="268" width="104" height="64" rx="9"/>
<text x="314" y="294" text-anchor="middle" class="ttl" font-size="13">寄存器</text>
<text x="314" y="313" text-anchor="middle" class="sub" font-size="11">/ 内存</text>
<g><rect class="card" x="384" y="262" width="158" height="78" rx="9"/><rect x="384" y="262" width="5" height="78" rx="2.5" fill="#e0a32e"/><circle cx="406" cy="284" r="11" fill="#e0a32e"/><text x="406" y="288" text-anchor="middle" class="lbl" font-size="12">3</text><text x="424" y="288" class="ttl" font-size="12.5">hi-reg 高寄存器</text><text x="396" y="316" class="sub" font-size="11">含 PC → 仅块边界</text></g>
<g><rect class="card" x="552" y="262" width="158" height="78" rx="9"/><rect x="552" y="262" width="5" height="78" rx="2.5" fill="#e0762e"/><circle cx="574" cy="284" r="11" fill="#e0762e"/><text x="574" y="288" text-anchor="middle" class="lbl" font-size="12">4</text><text x="592" y="288" class="ttl" font-size="12.5">LDR·STR·LDM</text><text x="564" y="316" class="sub" font-size="11">helper · 状态同步陷阱</text></g>
<g><rect class="card" x="720" y="262" width="158" height="78" rx="9"/><rect x="720" y="262" width="5" height="78" rx="2.5" fill="#e0762e"/><circle cx="742" cy="284" r="11" fill="#e0762e"/><text x="742" y="288" text-anchor="middle" class="lbl" font-size="12">4</text><text x="760" y="288" class="ttl" font-size="12.5">PUSH · POP</text><text x="732" y="316" class="sub" font-size="11">多访问 + 寄存器列表</text></g>

<rect class="lane" x="250" y="414" width="828" height="112" rx="12"/>
<rect class="tab" x="262" y="438" width="104" height="64" rx="9"/>
<text x="314" y="464" text-anchor="middle" class="ttl" font-size="13">控制流</text>
<text x="314" y="483" text-anchor="middle" class="sub" font-size="11">分支 / 跳转</text>
<g><rect class="card" x="384" y="432" width="158" height="78" rx="9"/><rect x="384" y="432" width="5" height="78" rx="2.5" fill="#e0a32e"/><circle cx="406" cy="454" r="11" fill="#e0a32e"/><text x="406" y="458" text-anchor="middle" class="lbl" font-size="12">3</text><text x="424" y="458" class="ttl" font-size="12.5">B · Bcc 条件分支</text><text x="396" y="486" class="sub" font-size="11">块终结符 · 14 条件码</text></g>
<g><rect class="card" x="552" y="432" width="158" height="78" rx="9"/><rect x="552" y="432" width="5" height="78" rx="2.5" fill="#d64545"/><circle cx="574" cy="454" r="11" fill="#d64545"/><text x="574" y="458" text-anchor="middle" class="lbl" font-size="12">5</text><text x="592" y="458" class="ttl" font-size="12.5">BL · BX · SWI</text><text x="564" y="486" class="sub" font-size="11">改 PC + 模式 → 解释器</text></g>

<rect class="lane" x="250" y="584" width="828" height="112" rx="12"/>
<rect class="tab" x="262" y="608" width="104" height="64" rx="9"/>
<text x="314" y="634" text-anchor="middle" class="ttl" font-size="13">ARM 模式</text>
<text x="314" y="653" text-anchor="middle" class="sub" font-size="11">32 位</text>
<g><rect class="card" x="384" y="602" width="494" height="78" rx="9"/><rect x="384" y="602" width="5" height="78" rx="2.5" fill="#d64545"/><circle cx="406" cy="624" r="11" fill="#d64545"/><text x="406" y="628" text-anchor="middle" class="lbl" font-size="12">5</text><text x="424" y="628" class="ttl" font-size="12.5">32 位 ARM 指令集</text><text x="424" y="656" class="sub" font-size="11">每条都可条件执行 + 第二操作数桶形移位 → 需独立的 translate_block_arm()（gpSP 模式）</text></g>

<text x="900" y="640" class="leg" font-size="11" text-anchor="end">复杂度</text>
<circle cx="916" cy="636" r="7" fill="#1f9d6b"/><text x="916" y="640" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">1</text>
<circle cx="950" cy="636" r="7" fill="#6aa84f"/><text x="950" y="640" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">2</text>
<circle cx="984" cy="636" r="7" fill="#e0a32e"/><text x="984" y="640" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">3</text>
<circle cx="1018" cy="636" r="7" fill="#e0762e"/><text x="1018" y="640" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">4</text>
<circle cx="1052" cy="636" r="7" fill="#d64545"/><text x="1052" y="640" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">5</text>
<text x="900" y="662" class="leg" font-size="10" text-anchor="end">易</text>
<text x="1064" y="662" class="leg" font-size="10">难</text>
</svg>
